// Tests deeply nested messages, oneof with message variants from the
// same package, direct recursion through a oneof, and all field type
// combinations in oneofs.

syntax = "proto3";

package test.nested;

// Three levels of nesting.
message Outer {
  string label = 1;

  message Middle {
    int32 value = 2;

    message Inner {
      bytes data = 1;
      bool active = 2;
    }

    Inner detail = 3;
  }

  Middle child = 2;

  // Oneof with a same-package message variant (triggers the view bug
  // if views are enabled).
  oneof content {
    string text = 3;
    Middle structured = 4;
  }
}

// Message with oneof covering many field types.
message MultiOneof {
  oneof value {
    int32 int_val = 1;
    int64 long_val = 2;
    float float_val = 3;
    double double_val = 4;
    bool bool_val = 5;
    string string_val = 6;
    bytes bytes_val = 7;
    Outer.Middle.Inner message_val = 8;
  }
}

// Self-referential message (tree structure).
message TreeNode {
  string name = 1;
  repeated TreeNode children = 2;
  map<string, string> attributes = 3;
}

// Direct recursion through a oneof (message/group variants are boxed to
// break the infinite-size cycle). Mirrors google.api.expr.v1alpha1.Type.
message Expr {
  oneof kind {
    int32 int_literal = 1;
    string string_literal = 2;
    Expr negated = 3;
    BinaryOp binary = 4;
  }
}

// Mutual recursion: BinaryOp -> Expr -> BinaryOp.
message BinaryOp {
  string op = 1;
  Expr lhs = 2;
  Expr rhs = 3;
}

// Direct singular-field recursion with NO oneof in the cycle.
// MessageFieldView<V> must box V to break the infinite-size cycle
// (same as owned MessageField<T>).
message Corecursive {
  string name = 1;
  Nested nested = 2;

  message Nested {
    int32 value = 1;
    Corecursive back = 2;
  }
}
