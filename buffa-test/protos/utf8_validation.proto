// Test that `utf8_validation = NONE` maps string fields to bytes in Rust.
//
// Rust's `&str` / `String` have a type-level invariant of valid UTF-8; when
// the proto says "don't validate," the only sound Rust representation is
// `&[u8]` / `Vec<u8>`. The user then explicitly chooses whether to validate
// (`std::str::from_utf8`) or assert validity (`from_utf8_unchecked`).

edition = "2023";

package utf8test;

message StringNoValidation {
  // File-scope default is VERIFY; override per-field to NONE.
  string raw_name = 1 [features.utf8_validation = NONE];

  // Control: this field uses VERIFY (edition 2023 default).
  string validated_name = 2;

  // Repeated NONE → Vec<Vec<u8>>.
  repeated string raw_tags = 3 [features.utf8_validation = NONE];

  // Explicit-presence NONE → Option<Vec<u8>> (editions default is explicit).
  string raw_comment = 4 [features.utf8_validation = NONE];

  // Map with NONE key and value → HashMap<Vec<u8>, Vec<u8>>.
  map<string, string> raw_labels = 5 [features.utf8_validation = NONE];
}

message OneofNoValidation {
  oneof content {
    string raw_text = 1 [features.utf8_validation = NONE];
    int32 number = 2;
  }
}

// Second file section would test file-level NONE, but protoc restricts
// utf8_validation to file-level or field-level only (not message-level).
// File-level would apply to ALL messages in this file including the ones
// above, so we test only per-field overrides here.
